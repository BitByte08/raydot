name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: cd backend && pip install -r requirements.txt
      - name: Verify imports
        run: cd backend && python -c "from main import app; print('OK')"
      - name: Init DB & seed
        run: cd backend && python init_db.py

  kiosk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/kiosk/package-lock.json
      - name: Install & Build
        run: |
          cd frontend/kiosk
          npm ci
          npm run build

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json
      - name: Install & Build
        run: |
          cd frontend/admin
          npm ci
          npm run build
